{% extends 'base.html' %}
{% block title %}Pet Stores — fluffbud{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="section-tag">🛒 Stores</div>
  <h2 class="page-header mb-4">Pet Stores Near You</h2>

  <div class="card-soft p-3 mb-4">
    <form id="storeSearchForm" class="d-flex gap-3 align-items-center flex-wrap">
      <input class="form-control" type="text" id="cityInput" placeholder="Search by city..." style="max-width:260px;"/>
      <button type="submit" class="btn btn-pill btn-rose">🔍 Search</button>
    </form>
    <div id="statusMessage" class="mt-2" style="font-size:.88rem;color:#7A6E78;"></div>
  </div>

  <div class="row g-4" id="storesContainer"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
window.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('storeSearchForm');
  const cityInput = document.getElementById('cityInput');
  const storesContainer = document.getElementById('storesContainer');
  const statusMessage = document.getElementById('statusMessage');

  function setStatus(text) {
    statusMessage.textContent = text || '';
  }

  function renderStores(stores) {
    storesContainer.innerHTML = '';

    if (!stores || stores.length === 0) {
      setStatus('No pet stores found in this city.');
      return;
    }

    setStatus('');
    stores.forEach(function (store) {
      const card = document.createElement('div');
      card.className = 'col-md-4 col-lg-3';
      card.innerHTML = `
        <div class="card-soft p-0 overflow-hidden h-100">
          <div style="width:100%;height:150px;background:linear-gradient(135deg,#FFF5E8,#F5EEFF);display:flex;align-items:center;justify-content:center;font-size:48px;">🛒</div>
          <div class="p-3">
            <div class="d-flex justify-content-between align-items-start mb-1">
              <h6 class="fw-bold mb-0">${store.name || ''}</h6>
              <span style="font-size:.85rem;color:#ff9500;font-weight:600;">⭐${store.rating || '4.5'}</span>
            </div>
            <p style="font-size:.82rem;color:#7A6E78;margin-bottom:6px;">📍 ${store.address || ''}</p>
            <p style="font-size:.8rem;color:#7A6E78;margin-bottom:8px;">📏 ${store.distance || ''}</p>
          </div>
        </div>
      `;
      storesContainer.appendChild(card);
    });
  }

  form.addEventListener('submit', function (event) {
    event.preventDefault();
    const city = cityInput.value.trim();

    if (!city) {
      setStatus('No pet stores found in this city.');
      storesContainer.innerHTML = '';
      return;
    }

    setStatus('Searching nearby stores...');
    storesContainer.innerHTML = '';

    fetch(`/api/stores?city=${encodeURIComponent(city)}`)
      .then(function (response) {
        if (!response.ok) {
          throw new Error('failed');
        }
        return response.json();
      })
      .then(function (stores) {
        renderStores(stores);
      })
      .catch(function () {
        storesContainer.innerHTML = '';
        setStatus('Unable to fetch stores. Please try again.');
      });
  });
});
</script>
{% endblock %}
