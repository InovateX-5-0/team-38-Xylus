{% extends 'base.html' %}
{% block title %}Add Inventory — fluffbud{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:560px;">
  <div class="section-tag">📦 Inventory</div>
  <h2 class="page-header mb-4">Add Inventory Item</h2>
  <div class="card-soft p-4">
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
      <div class="row g-3">
        <div class="col-12"><label class="form-label fw-semibold">Item Name *</label>{{ form.name }}</div>
        <div class="col-md-6"><label class="form-label fw-semibold">Category *</label>{{ form.category }}</div>
        <div class="col-md-6"><label class="form-label fw-semibold">Price (₹) *</label>{{ form.price }}</div>
        <div class="col-md-6"><label class="form-label fw-semibold">Stock Quantity *</label>{{ form.stock }}</div>
        <div class="col-12"><label class="form-label fw-semibold">Description</label>{{ form.description }}</div>
        <div class="col-12"><label class="form-label fw-semibold">Photo</label>{{ form.photo }}</div>
        <div class="col-12 form-check ms-3"><label class="form-check-label">{{ form.is_available }} Currently Available</label></div>
      </div>
      <div class="d-flex gap-3 mt-4">
        <button type="submit" class="btn btn-pill btn-rose flex-grow-1">Add Item 📦</button>
        <a href="{% url 'dashboard' %}" class="btn btn-pill btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
