{% extends 'base.html' %}
{% block title %}Add Product — fluffbud{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:620px;">
  <div class="section-tag">📦 Inventory</div>
  <h2 class="page-header mb-4">Add Product</h2>
  <div class="card-soft p-4">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-12"><label class="form-label fw-semibold">Product Name *</label>{{ form.product_name }}</div>
        <div class="col-md-6"><label class="form-label fw-semibold">Category *</label>{{ form.category }}</div>
        <div class="col-md-6"><label class="form-label fw-semibold">Price (₹) *</label>{{ form.price_per_unit }}</div>
        <div class="col-md-6"><label class="form-label fw-semibold">Stock Quantity *</label>{{ form.stock_quantity }}</div>
        <div class="col-12"><label class="form-label fw-semibold">Product Image (optional)</label>{{ form.product_image }}</div>
      </div>
      <div class="d-flex gap-3 mt-4">
        <button type="submit" class="btn btn-pill btn-rose flex-grow-1">Save Product</button>
        <a href="{% url 'dashboard' %}" class="btn btn-pill btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
