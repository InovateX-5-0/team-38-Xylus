{% extends 'base.html' %}
{% block title %}Book Appointment — fluffbud{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:600px;">
  <div class="section-tag">📅 Book Appointment</div>
  <h2 class="page-header mb-4">Schedule a vet visit</h2>
  <div class="card-soft p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3"><label class="form-label fw-semibold">Your Pet *</label>{{ form.pet }}</div>
      <div class="mb-3"><label class="form-label fw-semibold">Veterinarian *</label>{{ form.vet }}</div>
      <div class="mb-3"><label class="form-label fw-semibold">Appointment Type *</label>{{ form.appointment_type }}</div>
      <div class="row g-3 mb-3">
        <div class="col-6"><label class="form-label fw-semibold">Date *</label>{{ form.date }}</div>
        <div class="col-6"><label class="form-label fw-semibold">Time *</label>{{ form.time }}</div>
      </div>
      <div class="mb-3"><label class="form-label fw-semibold">Reason / Notes</label>{{ form.reason }}</div>
      <div class="d-flex gap-3 mt-3">
        <button type="submit" class="btn btn-pill btn-rose flex-grow-1">Book Appointment 📅</button>
        <a href="{% url 'appointments' %}" class="btn btn-pill btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
